<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 20px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #2a2a4a;
    }

    .option:last-child {
      border-bottom: none;
    }

    .option label {
      font-size: 13px;
      cursor: pointer;
      flex: 1;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #444;
      border-radius: 24px;
      transition: background 0.2s;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    input:checked + .slider {
      background: #6c5ce7;
    }

    input:checked + .slider::before {
      transform: translateX(20px);
    }

    .footer {
      margin-top: 16px;
      font-size: 11px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>🛡️ Jam Block YouTube</h1>

  <div class="option">
    <label for="blockHomeFeed">Block home feed</label>
    <div class="toggle">
      <input type="checkbox" id="blockHomeFeed" checked>
      <span class="slider"></span>
    </div>
  </div>

  <div class="option">
    <label for="blockShorts">Block Shorts</label>
    <div class="toggle">
      <input type="checkbox" id="blockShorts" checked>
      <span class="slider"></span>
    </div>
  </div>

  <div class="option">
    <label for="blockRecommendations">Block recommendations</label>
    <div class="toggle">
      <input type="checkbox" id="blockRecommendations" checked>
      <span class="slider"></span>
    </div>
  </div>

  <div class="footer">Focus on what matters</div>

  <script src="dist/popup.js"></script>
</body>
</html>
