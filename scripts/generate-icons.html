<!DOCTYPE html>
<html>
<body>
<p>Open this file in a browser, right-click each canvas and "Save image as" to icons/icon48.png and icons/icon128.png</p>

<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c128" width="128" height="128"></canvas>

<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext("2d");

  // Background circle
  ctx.fillStyle = "#6c5ce7";
  ctx.beginPath();
  ctx.arc(s/2, s/2, s/2, 0, Math.PI * 2);
  ctx.fill();

  // Shield shape
  ctx.fillStyle = "#fff";
  ctx.beginPath();
  const cx = s/2, top = s*0.18, bot = s*0.82, mid = s*0.55;
  ctx.moveTo(cx, top);
  ctx.quadraticCurveTo(s*0.8, s*0.22, s*0.8, mid);
  ctx.quadraticCurveTo(s*0.78, s*0.72, cx, bot);
  ctx.quadraticCurveTo(s*0.22, s*0.72, s*0.2, mid);
  ctx.quadraticCurveTo(s*0.2, s*0.22, cx, top);
  ctx.fill();

  // Block symbol (X)
  ctx.strokeStyle = "#6c5ce7";
  ctx.lineWidth = s * 0.07;
  ctx.lineCap = "round";
  const p = s * 0.32, q = s * 0.68;
  ctx.beginPath();
  ctx.moveTo(p, p + s*0.05);
  ctx.lineTo(q, q - s*0.05);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(q, p + s*0.05);
  ctx.lineTo(p, q - s*0.05);
  ctx.stroke();
}

drawIcon(document.getElementById("c48"));
drawIcon(document.getElementById("c128"));
</script>
</body>
</html>
